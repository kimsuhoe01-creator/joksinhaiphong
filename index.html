<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>족발신선생 하이퐁점 메뉴</title>
  <meta name="description" content="족발신선생 하이퐁점 QR 메뉴" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Noto+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <section id="langScreen" class="lang-screen">
    <div class="lang-box">
      <img class="lang-logo" src="logo.png" alt="족발신선생" onerror="this.style.display='none'">
      <p class="branch">Hải Phòng</p>
      <h1>언어를 선택해주세요</h1>
      <div class="lang-grid">
        <button data-lang="ko">한국어</button>
        <button data-lang="vi">Tiếng Việt</button>
        <button data-lang="en">English</button>
        <button data-lang="zh">中文</button>
      </div>
    </div>
  </section>

  <div id="app" class="app hidden">
    <header class="top">
      <div class="top-inner">
        <img class="logo" src="logo.png" alt="족발신선생" onerror="this.style.display='none'">
        <div class="store-text">
          <strong data-t="storeName">족발신선생 하이퐁점</strong>
          <span>18 Ng. 182 Văn Cao, Gia Viên, Hải Phòng</span>
        </div>
        <a class="small-btn map-btn" href="https://maps.app.goo.gl/oVMmpN8FTPKjYacH9" target="_blank" rel="noopener" aria-label="Google Maps">📍</a>
      </div>
      <div class="action-row">
        <a class="action call" href="tel:0393115504" data-t="call">전화</a>
        <a class="action delivery" href="https://www.deliveryk.com/shops/7446" target="_blank" rel="noopener" data-t="delivery">DeliveryK</a>
      </div>
    </header>

    <nav id="catNav" class="cat-nav" aria-label="menu categories"></nav>
    <main id="menu" class="menu"></main>

    <footer class="footer">
      <strong data-t="storeName">족발신선생 하이퐁점</strong>
      <p>0393 115 504 · 11:30–00:30</p>
      <p data-t="priceNote">가격은 VND 기준이며 POS/영수증 가격과 동일합니다.</p>
    </footer>
  </div>

  <div id="photoModal" class="modal hidden" role="dialog" aria-modal="true">
    <button id="modalClose" class="modal-close" type="button">×</button>
    <img id="modalImg" alt="menu photo" />
    <div id="modalCaption" class="modal-caption"></div>
  </div>

  <button id="toTop" class="to-top hidden" type="button">▲</button>
  <script src="js/app.js"></script>
</body>
</html>
